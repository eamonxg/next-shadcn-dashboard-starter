document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"61379635-ffa6-4d2e-bffe-857945141e2c\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"705d497d-c2eb-40e4-8af7-7208107c97ce\"><\u002Fscript>\n<style>\n  body{margin:0;background:#0a111f;\n    --bg:#0a111f;--card:#101a2d;--card2:#0d1626;--line:#1e2a46;--text:#e7eef9;--muted:#8b9dbb;--accent:#38bdf8;}\n  body.light{background:#f2f5fa;\n    --bg:#f2f5fa;--card:#ffffff;--card2:#f7f9fd;--line:#e2e8f2;--text:#182136;--muted:#5f6d88;--accent:#0284c7;}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"报料数据驾驶舱\" style=\"min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;transition:background .3s\">\n<div style=\"max-width:1280px;margin:0 auto;padding:0 14px 60px\">\n\n  <!-- ===== 顶栏 ===== -->\n  <div style=\"position:sticky;top:0;z-index:20;background:var(--bg);padding:14px 0 10px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;border-bottom:1px solid var(--line)\">\n    <div style=\"display:flex;flex-direction:column;gap:3px;margin-right:auto\">\n      <div style=\"font-size:18px;font-weight:700;letter-spacing:.5px\">报料数据驾驶舱<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#34d399;animation:pulse 2s infinite\"><\u002Fspan>\n        <span>实时监测 · 最后更新 {{ lastUpdated }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:3px\">\n      <sc-for list=\"{{ rangeButtons }}\" as=\"b\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ b.onClick }}\" style=\"border:none;cursor:pointer;font-size:12px;padding:5px 12px;border-radius:6px;background:{{ b.bg }};color:{{ b.fg }};font-weight:{{ b.fw }}\">{{ b.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px\">\n      <button onclick=\"{{ onRefresh }}\" title=\"刷新数据\" style=\"cursor:pointer;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center\">\n        <span style=\"display:inline-block;font-size:14px;animation:{{ refreshAnim }}\">⟳<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ toggleTheme }}\" title=\"主题切换\" style=\"cursor:pointer;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:13px\">{{ themeIcon }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== KPI ===== -->\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:14px\">\n    <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n      <div title=\"{{ k.tip }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px 10px;display:flex;flex-direction:column;gap:6px\">\n        <div style=\"font-size:12px;color:var(--muted)\">{{ k.name }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <span style=\"font-size:26px;font-weight:700;font-variant-numeric:tabular-nums\">{{ k.value }}<\u002Fspan>\n          <span style=\"font-size:11px;color:var(--muted)\">{{ k.unit }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:{{ k.deltaColor }};font-variant-numeric:tabular-nums\">{{ k.arrow }} {{ k.deltaText }}<\u002Fdiv>\n        <svg viewBox=\"0 0 100 26\" preserveAspectRatio=\"none\" style=\"width:100%;height:26px;margin-top:2px\">\n          <polyline points=\"{{ k.spark }}\" fill=\"none\" stroke=\"{{ k.sparkColor }}\" stroke-width=\"2\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== 运营态势摘要 ===== -->\n  <div style=\"margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px\">\n    <sc-for list=\"{{ insights }}\" as=\"ins\" hint-placeholder-count=\"3\">\n      <button onclick=\"{{ ins.onClick }}\" style=\"cursor:pointer;text-align:left;background:var(--card);border:1px solid {{ ins.border }};border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;color:var(--text)\">\n        <span style=\"margin-top:4px;flex:none;width:8px;height:8px;border-radius:50%;background:{{ ins.dot }}\"><\u002Fspan>\n        <span style=\"display:flex;flex-direction:column;gap:3px\">\n          <span style=\"font-size:13px;font-weight:600\">{{ ins.title }}<\u002Fspan>\n          <span style=\"font-size:11px;color:var(--muted);line-height:1.5\">{{ ins.desc }}<\u002Fspan>\n          <span style=\"font-size:11px;color:var(--accent);font-weight:600\">{{ ins.actionLabel }} →<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== 筛选 chips ===== -->\n  <sc-if value=\"{{ hasChips }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n      <span style=\"font-size:11px;color:var(--muted)\">当前筛选<\u002Fspan>\n      <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"1\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--card);border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:4px 6px 4px 12px\">\n          {{ c.label }}\n          <button onclick=\"{{ c.remove }}\" style=\"cursor:pointer;border:none;background:transparent;color:var(--accent);font-size:12px;line-height:1;padding:2px 5px\">✕<\u002Fbutton>\n        <\u002Fspan>\n      <\u002Fsc-for>\n      <button onclick=\"{{ clearAll }}\" style=\"cursor:pointer;font-size:11px;border:none;background:transparent;color:var(--muted);text-decoration:underline\">清空全部<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== 概览 ===== -->\n  <div style=\"margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px\">\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n        <div style=\"font-size:13px;font-weight:600\">来源渠道占比<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted)\">点击扇区可下钻<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:230px;margin-top:8px\"><canvas ref=\"{{ channelRef }}\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n        <div style=\"font-size:13px;font-weight:600\">线索类型分布<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted)\">总量 vs 已采用 · 点击可下钻<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:230px;margin-top:8px\"><canvas ref=\"{{ categoryRef }}\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n        <div style=\"font-size:13px;font-weight:600\">区域热区矩阵<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted)\">颜色深浅 = 报料密度<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px\">\n        <sc-for list=\"{{ districts }}\" as=\"d\" hint-placeholder-count=\"10\">\n          <button onclick=\"{{ d.onClick }}\" aria-label=\"{{ d.name }}\" style=\"cursor:pointer;position:relative;text-align:left;border:1px solid {{ d.border }};background:{{ d.bg }};border-radius:9px;padding:9px 10px;color:var(--text);display:flex;flex-direction:column;gap:2px\">\n          <sc-if value=\"{{ d.dotShow }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:#ef4444\"><\u002Fspan>\n          <\u002Fsc-if>\n          <span style=\"font-size:12px;font-weight:600\">{{ d.name }}<\u002Fspan>\n          <span style=\"font-size:16px;font-weight:700;font-variant-numeric:tabular-nums\">{{ d.count }}<\u002Fspan>\n          <span style=\"font-size:10px;color:var(--muted)\">待审核 {{ d.pending }}<\u002Fspan>\n        <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== 趋势 ===== -->\n  <div style=\"margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px\">\n      <div style=\"font-size:13px;font-weight:600\">线索量与采用率趋势<\u002Fdiv>\n      <div style=\"display:flex;gap:4px;background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:2px\">\n        <sc-for list=\"{{ granButtons }}\" as=\"g\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ g.onClick }}\" style=\"border:none;cursor:pointer;font-size:11px;padding:4px 11px;border-radius:5px;background:{{ g.bg }};color:{{ g.fg }}\">{{ g.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:250px;margin-top:8px\"><canvas ref=\"{{ trendRef }}\"><\u002Fcanvas><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== 明细表 ===== -->\n  <div style=\"margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 0 6px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:0 16px\">\n      <div style=\"font-size:13px;font-weight:600\">报料明细 <span style=\"font-weight:400;font-size:11px;color:var(--muted)\">当前筛选 {{ filteredCount }} 条 / 全量 {{ totalCount }} 条<\u002Fspan><\u002Fdiv>\n      <button onclick=\"{{ onExport }}\" style=\"cursor:pointer;font-size:12px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:7px;padding:6px 14px;opacity:{{ exportOpacity }}\">导出 CSV<\u002Fbutton>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:40px 16px;text-align:center;color:var(--muted);font-size:13px\">\n        <div style=\"font-size:26px;margin-bottom:8px\">⌀<\u002Fdiv>\n        当前筛选条件下暂无报料数据\n        <div style=\"margin-top:12px\"><button onclick=\"{{ clearAll }}\" style=\"cursor:pointer;font-size:12px;border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:7px;padding:6px 16px\">清空筛选条件<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ notEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"overflow-x:auto;margin-top:10px\">\n      <div style=\"min-width:1020px\">\n        <div style=\"display:grid;grid-template-columns:120px minmax(220px,1.8fr) 92px 130px 76px 84px 100px 118px 90px 76px;gap:0;padding:8px 16px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--line)\">\n          <span>编号<\u002Fspan><span>标题<\u002Fspan><span>类型<\u002Fspan><span>来源<\u002Fspan><span>区域<\u002Fspan><span>状态<\u002Fspan><span>优先级<\u002Fspan>\n          <button onclick=\"{{ sortByTime }}\" style=\"cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:11px;text-align:left;padding:0\">报料时间 {{ timeSortIcon }}<\u002Fbutton>\n          <button onclick=\"{{ sortByResp }}\" style=\"cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:11px;text-align:left;padding:0\">响应时长 {{ respSortIcon }}<\u002Fbutton>\n          <span>跟进人<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ pageRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n          <div>\n            <div onclick=\"{{ r.toggle }}\" style=\"display:grid;grid-template-columns:120px minmax(220px,1.8fr) 92px 130px 76px 84px 100px 118px 90px 76px;align-items:center;padding:9px 16px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--line);background:{{ r.rowBg }}\" style-hover=\"background:var(--card2)\">\n              <span style=\"color:var(--muted);font-variant-numeric:tabular-nums\">{{ r.id }}<\u002Fspan>\n              <span title=\"{{ r.title }}\" style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px\">{{ r.title }}<\u002Fspan>\n              <span><span style=\"font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card2);border:1px solid var(--line)\">{{ r.category }}<\u002Fspan><\u002Fspan>\n              <span style=\"font-size:11px;color:var(--muted)\">{{ r.channel }}<\u002Fspan>\n              <span style=\"font-size:11px\">{{ r.district }}<\u002Fspan>\n              <span><span style=\"font-size:11px;padding:2px 8px;border-radius:999px;background:{{ r.statusBg }};color:{{ r.statusFg }}\">{{ r.status }}<\u002Fspan><\u002Fspan>\n              <span><span style=\"font-size:11px;padding:2px 8px;border-radius:999px;background:{{ r.priBg }};color:{{ r.priFg }}\">{{ r.priLabel }}<\u002Fspan><\u002Fspan>\n              <span style=\"font-variant-numeric:tabular-nums;color:var(--muted)\">{{ r.time }}<\u002Fspan>\n              <span style=\"font-variant-numeric:tabular-nums\">{{ r.resp }}<\u002Fspan>\n              <span style=\"font-size:11px;color:var(--muted)\">{{ r.assignee }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ r.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:12px 16px 14px;background:var(--card2);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px\">\n                <div style=\"font-size:12px;line-height:1.7;color:var(--text)\">{{ r.desc }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#f59e0b\">优先级判定：{{ r.reason }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:6px\">\n                  <sc-for list=\"{{ r.timeline }}\" as=\"t\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex;gap:10px;font-size:11px;align-items:baseline\">\n                      <span style=\"color:var(--muted);font-variant-numeric:tabular-nums;flex:none;width:96px\">{{ t.time }}<\u002Fspan>\n                      <span style=\"flex:none;width:6px;height:6px;border-radius:50%;background:var(--accent);position:relative;top:-1px\"><\u002Fspan>\n                      <span>{{ t.action }} · <span style=\"color:var(--muted)\">{{ t.operator }}<\u002Fspan><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;padding:10px 16px 6px\">\n      <span style=\"font-size:11px;color:var(--muted)\">{{ pageLabel }}<\u002Fspan>\n      <div style=\"display:flex;gap:8px\">\n        <button onclick=\"{{ prevPage }}\" style=\"cursor:pointer;font-size:12px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:6px;padding:5px 12px;opacity:{{ prevOpacity }}\">上一页<\u002Fbutton>\n        <button onclick=\"{{ nextPage }}\" style=\"cursor:pointer;font-size:12px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:6px;padding:5px 12px;opacity:{{ nextOpacity }}\">下一页<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:16px;font-size:10px;color:var(--muted);text-align:center;line-height:1.8\">\n    数据为前端模拟，覆盖近 180 天 · 优先级由规则派生（突发未采用 / 待审核超 60 分钟 / 响应超 240 分钟 → 高）<br>\n    报料数据驾驶舱 H5 · 原型 v0.1\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;autoLive&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;演示&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;外观&quot;},&quot;pageSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:8,&quot;min&quot;:5,&quot;max&quot;:20,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;明细表&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.channels = ['新闻客户端 APP', '微信公众号', '新闻热线电话', '微博', '短视频平台', '现场投递'];\n    this.categories = ['突发事件', '民生投诉', '交通出行', '文体娱乐', '环境城建', '其他'];\n    this.districtNames = ['天河区', '越秀区', '海珠区', '白云区', '荔湾区', '番禺区', '黄埔区', '花都区', '南沙区', '增城区'];\n    this.statuses = ['待审核', '跟进中', '已采用', '不予采用'];\n    this.palette = ['#38bdf8', '#818cf8', '#34d399', '#fbbf24', '#f472b6', '#94a3b8'];\n    this.now = new Date();\n    this.records = this.genData();\n    this.channelRef = React.createRef();\n    this.categoryRef = React.createRef();\n    this.trendRef = React.createRef();\n    this.state = {\n      range: 'week', granularity: 'day',\n      filters: { channel: null, category: null, district: null, status: null, priority: null },\n      sortKey: 'priority', sortDir: 'desc',\n      page: 1, expandedId: null,\n      theme: props.defaultTheme ?? 'dark',\n      refreshing: false, lastUpdated: this.fmtTime(this.now)\n    };\n  }\n\n  rng(seed) { let a = seed; return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }\n\n  genData() {\n    const r = this.rng(20260704);\n    const recs = [];\n    const titles = {\n      '突发事件': ['立交桥下积水严重车辆被困', '化工厂附近有刺鼻气味', '某小区突发火情浓烟明显', '路段燃气管道疑似泄漏', '高架桥段多车追尾'],\n      '民生投诉': ['小区电梯停运三天无人维修', '农贸市场占道经营影响通行', '老旧小区水压不足', '物业收费不透明业主质疑', '夜市噪音扰民持续到凌晨'],\n      '交通出行': ['公交站台改造后候车无遮挡', '路口红绿灯配时不合理', '共享单车堆积占用盲道', '地铁口摩的拉客乱象', '学校门口高峰期严重拥堵'],\n      '文体娱乐': ['社区文化节将于本周末举行', '老字号书店即将闭店引怀旧潮', '市民自发组织江边合唱团', '新落成体育馆开放预约', '街头艺人聚集点人气旺'],\n      '环境城建': ['河涌水体发黑有异味', '工地夜间施工扬尘扰民', '人行道砖块破损存在隐患', '公园绿化带被违规占用', '垃圾分类点满溢无人清运'],\n      '其他': ['市民拾金不昧寻找失主', '流浪猫聚集引发讨论', '社区团购点纠纷求助', '老人走失家属求扩散', '疑似电信诈骗新话术提醒']\n    };\n    const descTail = '，多位市民反映情况持续，希望媒体关注并跟进核实。现场情况可提供照片与视频佐证。';\n    const reporters = ['市民王**', '市民李**', '市民张**', '市民陈**', '市民刘**', '匿名网友'];\n    const assignees = ['周晓明', '林可', '赵一帆', '陈晨', '孙倩', '吴迪'];\n    const today = new Date(this.now); today.setHours(0, 0, 0, 0);\n    for (let d = 179; d >= 0; d--) {\n      const day = new Date(today); day.setDate(day.getDate() - d);\n      const isWeekend = day.getDay() === 0 || day.getDay() === 6;\n      let count = isWeekend ? 2 + Math.floor(r() * 3) : 4 + Math.floor(r() * 4);\n      if (d === 0) count = 12 + Math.floor(r() * 4);\n      if (d === 1) count = 9 + Math.floor(r() * 3);\n      for (let i = 0; i < count; i++) {\n        const cat = this.categories[Math.floor(r() * (r() < 0.75 ? 5 : 6))];\n        const channel = this.channels[Math.floor(r() * 6)];\n        const district = this.districtNames[Math.floor(Math.pow(r(), 1.6) * 10)];\n        const hour = 7 + Math.floor(r() * 15);\n        const created = new Date(day); created.setHours(hour, Math.floor(r() * 60), 0, 0);\n        if (d === 0 && created > this.now) created.setTime(this.now.getTime() - Math.floor(r() * 6 + 0.5) * 3600e3);\n        let status;\n        if (d === 0) status = r() < 0.55 ? '待审核' : (r() < 0.6 ? '跟进中' : '已采用');\n        else if (d <= 2) status = r() < 0.2 ? '待审核' : r() < 0.45 ? '跟进中' : r() < 0.75 ? '已采用' : '不予采用';\n        else status = r() < 0.12 ? '跟进中' : r() < 0.72 ? '已采用' : '不予采用';\n        const resp = status === '待审核' ? null : 15 + Math.floor(r() * (r() < 0.85 ? 200 : 400));\n        const ts = titles[cat];\n        const title = ts[Math.floor(r() * ts.length)] + (r() < 0.4 ? '（' + district + '）' : '');\n        const timeline = [{ time: created, action: '线索提交', operator: reporters[Math.floor(r() * 6)] }];\n        const assignee = assignees[Math.floor(r() * 6)];\n        if (status !== '待审核') {\n          timeline.push({ time: new Date(created.getTime() + (resp || 60) * 60e3), action: status === '不予采用' ? '编辑审核 · 不予采用' : '编辑审核通过', operator: '值班编辑' });\n          if (status === '跟进中' || status === '已采用') timeline.push({ time: new Date(created.getTime() + ((resp || 60) + 90) * 60e3), action: '记者跟进核实', operator: assignee });\n          if (status === '已采用') timeline.push({ time: new Date(created.getTime() + ((resp || 60) + 300) * 60e3), action: '成稿发布', operator: assignee });\n        }\n        const seq = String(i + 1).padStart(3, '0');\n        const ymd = day.getFullYear() + String(day.getMonth() + 1).padStart(2, '0') + String(day.getDate()).padStart(2, '0');\n        recs.push({\n          id: 'BL-' + ymd + '-' + seq, title, category: cat, channel, district, status,\n          reporter: reporters[Math.floor(r() * 6)], assignee: status === '待审核' ? '—' : assignee,\n          createdAt: created, responseMinutes: resp, timeline,\n          description: title.replace(/（.*）/, '') + '。报料人称事发于' + district + '附近' + descTail\n        });\n      }\n    }\n    recs.sort((a, b) => b.createdAt - a.createdAt);\n    return recs;\n  }\n\n  priority(rec) {\n    const pendMin = Math.round((this.now - rec.createdAt) / 60e3);\n    if (rec.category === '突发事件' && rec.status !== '已采用') return { level: 'high', label: '需优先处理', reason: '突发事件且尚未采用' };\n    if (rec.status === '待审核' && pendMin > 6 egend.labels.color = t.legend;\n    this.categoryChart.update();\n    const trend = this.buildTrend();\n    this.trendChart.data.labels = trend.map(b => b.label);\n    this.trendChart.data.datasets[0].data = trend.map(b => b.count);\n    this.trendChart.data.datasets[1].data = trend.map(b => b.adopt);\n    this.trendChart.options.scales.y.grid.color = t.grid;\n    this.trendChart.options.scales.y.ticks.color = t.tick;\n    this.trendChart.options.scales.y1.ticks.color = t.tick;\n    this.trendChart.options.scales.x.ticks.color = t.tick;\n    this.trendChart.options.plugins.legend.labels.color = t.legend;\n    this.trendChart.update();\n  }\n\n  componentDidMount() {\n    if ((this.props.defaultTheme ?? 'dark') === 'light') document.body.classList.add('light');\n    this.initCharts();\n    if (this.props.autoLive ?? true) {\n      this.liveTimer = setInterval(() => {\n        const r = Math.random();\n        if (r < 0.65) {\n          const src = this.records[Math.floor(Math.random() * 40)];\n          const now = new Date();\n          this.records.unshift(Object.assign({}, src, {\n            id: 'BL-LIVE-' + String(Math.floor(Math.random() * 900) + 100),\n            status: '待审核', responseMinutes: null, assignee: '—', createdAt: now,\n            timeline: [{ time: now, action: '线索提交', operator: '市民' + '赵钱孙李'[Math.floor(Math.random() * 4)] + '**' }]\n          }));\n          this.setState({ lastUpdated: this.fmtTime(now) });\n        }\n      }, 10000);\n    }\n  }\n\n  componentWillUnmount() { clearInterval(this.liveTimer); clearTimeout(this._chartWait); }\n  componentDidUpdate() { this.syncCharts(); }\n\n  onExportCsv(rows) {\n    if (!rows.length) return;\n    const f = this.state.filters;\n    const cond = ['时间范围:' + ({ today: '今天', week: '本周', month: '本月', all: '全部' })[this.state.range]]\n      .concat(Object.entries(f).filter(([, v]) => v).map(([k, v]) => ({ channel: '来源', category: '类型', district: '区域', status: '状态', priority: '优先级' })[k] + ':' + v));\n    const esc = s => '\"' + String(s).replace(/\"/g, '\"\"') + '\"';\n    const lines = [\n      '# 报料线索导出', '# 导出时间:' + new Date().toLocaleString('zh-CN'), '# 筛选条件:' + cond.join(' / '), '# 记录数:' + rows.length, '',\n      ['编号', '标题', '类型', '来源', '区域', '状态', '优先级', '报料时间', '响应时长(分钟)', '跟进人', '描述'].join(',')\n    ];\n    rows.forEach(rec => {\n      const p = this.priority(rec);\n      lines.push([rec.id, esc(rec.title), rec.category, rec.channel, rec.district, rec.status, { high: '高', medium: '中', low: '低' }[p.level], this.fmtTime(rec.createdAt), rec.responseMinutes ?? '-', rec.assignee, esc(rec.description)].join(','));\n    });\n    const blob = new Blob(['\\uFEFF' + lines.join('\\n')], { type: 'text/csv;charset=utf-8' });\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    const d = new Date();\n    a.download = '报料线索_' + d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0') + '.csv';\n    a.click(); URL.revokeObjectURL(a.href);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const filtered = this.filteredRecs();\n    const prioOrder = { high: 0, medium: 1, low: 2 };\n    const sorted = filtered.slice().sort((a, b) => {\n      if (s.sortKey === 'priority') {\n        const d = prioOrder[this.priority(a).level] - prioOrder[this.priority(b).level];\n        return d !== 0 ? d : b.createdAt - a.createdAt;\n      }\n      if (s.sortKey === 'time') return s.sortDir === 'desc' ? b.createdAt - a.createdAt : a.createdAt - b.createdAt;\n      const av = a.responseMinutes ?? -1, bv = b.responseMinutes ?? -1;\n      return s.sortDir === 'desc' ? bv - av : av - bv;\n    });\n    const pageSize = this.props.pageSize ?? 8;\n    const pages = Math.max(1, Math.ceil(sorted.length / pageSize));\n    const page = Math.min(s.page, pages);\n    const pageRows = sorted.slice((page - 1) * pageSize, page * pageSize).map(rec => {\n      const p = this.priority(rec);\n      const stStyle = { '待审核': ['rgba(251,191,36,.15)', '#fbbf24'], '跟进中': ['rgba(56,189,248,.15)', '#38bdf8'], '已采用': ['rgba(52,211,153,.15)', '#34d399'], '不予采用': ['rgba(148,163,184,.15)', '#94a3b8'] }[rec.status];\n      const prStyle = { high: ['rgba(239,68,68,.15)', '#ef4444'], medium: ['rgba(245,158,11,.15)', '#f59e0b'], low: ['rgba(148,163,184,.12)', '#94a3b8'] }[p.level];\n      const fresh = (this.now && (new Date() - rec.createdAt) < 30000);\n      return {\n        id: rec.id, title: rec.title, category: rec.category, channel: rec.channel, district: rec.district,\n        status: rec.status, statusBg: stStyle[0], statusFg: stStyle[1],\n        priLabel: p.label, priBg: prStyle[0], priFg: prStyle[1], reason: p.reason,\n        time: this.fmtTime(rec.createdAt), resp: rec.responseMinutes === null ? '-' : rec.responseMinutes + ' 分钟',\n        assignee: rec.assignee, desc: rec.description,\n        rowBg: fresh ? 'rgba(56,189,248,.08)' : 'transparent',\n        expanded: s.expandedId === rec.id,\n        toggle: () => this.setState(st => ({ expandedId: st.expandedId === rec.id ? null : rec.id })),\n        timeline: rec.timeline.map(t => ({ time: this.fmtTime(t.time), action: t.action, operator: t.operator }))\n      };\n    });\n    const rangeDefs = [['today', '今天'], ['week', '本周'], ['month', '本月'], ['all', '全部']];\n    const granDefs = [['day', '日'], ['week', '周'], ['month', '月']];\n    const chipDefs = { channel: '来源', category: '类型', district: '区域', status: '状态', priority: '优先级' };\n    const chips = Object.entries(s.filters).filter(([, v]) => v).map(([k, v]) => ({\n      label: chipDefs[k] + '：' + ({ high: '高优先级', medium: '中优先级', low: '低优先级' }[v] || v),\n      remove: () => this.setFilter(k, s.filters[k])\n    }));\n    const rangeRecs = this.rangeRecs();\n    const byDist = this.districtNames.map(n => {\n      const list = rangeRecs.filter(r => r.district === n);\n      return { name: n, count: list.length, pending: list.filter(r => r.status === '待审核').length };\n    }).sort((a, b) => b.count - a.count);\n    const maxD = Math.max(...byDist.map(d => d.count), 1);\n    const dark = s.theme === 'dark';\n    return {\n      lastUpdated: s.lastUpdated,\n      themeIcon: dark ? '☀' : '☾',\n      refreshAnim: s.refreshing ? 'spin 1s linear infinite' : 'none',\n      toggleTheme: () => { document.body.classList.toggle('light'); this.setState({ theme: dark ? 'light' : 'dark' }); },\n      onRefresh: () => {\n        this.setState({ refreshing: true });\n        setTimeout(() => this.setState({ refreshing: false, lastUpdated: this.fmtTime(new Date()) }), 700);\n      },\n      rangeButtons: rangeDefs.map(([v, label]) => ({\n        label, onClick: () => this.setState({ range: v, page: 1, expandedId: null }),\n        bg: s.range === v ? 'var(--accent)' : 'transparent', fg: s.range === v ? (dark ? '#0a111f' : '#fff') : 'var(--muted)', fw: s.range === v ? '700' : '400'\n      })),\n      granButtons: granDefs.map(([v, label]) => ({\n        label, onClick: () => this.setState({ granularity: v }),\n        bg: s.granularity === v ? 'var(--accent)' : 'transparent', fg: s.granularity === v ? (dark ? '#0a111f' : '#fff') : 'var(--muted)'\n      })),\n      kpis: this.buildKpis(),\n      insights: this.buildInsights(rangeRecs).map(i => ({\n        title: i.title, desc: i.desc, actionLabel: i.actionLabel, dot: i.tone, border: 'var(--line)', onClick: i.act\n      })),\n      hasChips: chips.length > 0, chips, clearAll: () => this.clearAllFilters(),\n      channelRef: this.channelRef, categoryRef: this.categoryRef, trendRef: this.trendRef,\n      districts: byDist.map(d => {\n        const active = s.filters.district === d.name;\n        const alpha = 0.06 + (d.count / maxD) * 0.38;\n        return {\n          name: d.name, count: d.count, pending: d.pending,\n          dotShow: d.pending >= 3,\n          bg: dark ? 'rgba(56,189,248,' + alpha.toFixed(2) + ')' : 'rgba(2,132,199,' + (alpha * 0.8).toFixed(2) + ')',\n          border: active ? 'var(--accent)' : 'var(--line)',\n          onClick: () => this.setFilter('district', d.name)\n        };\n      }),\n      filteredCount: filtered.length, totalCount: this.records.length,\n      isEmpty: filtered.length === 0, notEmpty: filtered.length > 0,\n      exportOpacity: filtered.length ? '1' : '0.4',\n      onExport: () => this.onExportCsv(sorted),\n      pageRows,\n      timeSortIcon: s.sortKey === 'time' ? (s.sortDir === 'desc' ? '↓' : '↑') : '⇅',\n      respSortIcon: s.sortKey === 'resp' ? (s.sortDir === 'desc' ? '↓' : '↑') : '⇅',\n      sortByTime: () => this.setState(st => ({ sortKey: 'time', sortDir: st.sortKey === 'time' && st.sortDir === 'desc' ? 'asc' : 'desc', page: 1 })),\n      sortByResp: () => this.setState(st => ({ sortKey: 'resp', sortDir: st.sortKey === 'resp' && st.sortDir === 'desc' ? 'asc' : 'desc', page: 1 })),\n      pageLabel: '第 ' + page + ' / ' + pages + ' 页 · 默认按优先级排序',\n      prevOpacity: page > 1 ? '1' : '0.4', nextOpacity: page < pages ? '1' : '0.4',\n      prevPage: () => this.setState(st => ({ page: Math.max(1, st.page - 1), expandedId: null })),\n      nextPage: () => this.setState(st => ({ page: Math.min(pages, st.page + 1), expandedId: null }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
